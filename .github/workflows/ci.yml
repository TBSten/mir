name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm test
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Verify CLI binary
        run: |
          ls -lh packages/cli/dist/cli.js
          head -1 packages/cli/dist/cli.js | grep -q "#!/usr/bin/env node"

      - name: Verify Web build
        run: |
          ls -lh packages/official-registry/dist/
          test -f packages/official-registry/dist/_worker.js

  verify-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published packages
        run: |
          echo "Verifying npm packages are accessible..."
          npm view @tbsten/mir-core@alpha version
          npm view @tbsten/mir-registry-sdk@alpha version
          npm view @tbsten/mir@alpha version
        continue-on-error: true

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: E2E Tests
        run: npm run test:e2e --workspace=packages/official-registry
        continue-on-error: true

  status-check:
    runs-on: ubuntu-latest
    needs: [test, build-artifacts]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.build-artifacts.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All checks passed"
